<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Six or Not Six Fruit Animation</title>
<style>
body {margin:0;background:#ddd;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:Century Gothic;}
.container {text-align:center;}
h1 {color:#333;}
.canvas {width:900px;height:500px;background:white;position:relative;overflow:hidden;border-radius:10px;box-shadow:0 4px 6px rgba(0,0,0,0.2);margin:20px auto;}
img {position:absolute;width:110px;transform:translate(-50%,-50%);filter:drop-shadow(6px 10px 12px rgba(0,0,0,0.3));}
.controls {margin-top:15px;}
button {font-size:20px;padding:10px 20px;margin:0 10px;cursor:pointer;background:#007bff;color:white;border:none;border-radius:5px;font-weight:bold;}
button:hover {background:#0056b3;}
.info {margin-top:10px;font-size:16px;color:#333;}
</style>
</head>
<body>

<div class="container">
<h1>Six or Not Six Fruit Animation</h1>

<div class="canvas" id="c"></div>

<div class="controls">
<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
</div>

<div class="info">
<p id="groupInfo">Click Start to begin!</p>
</div>
</div>

<script>
const fruitsData = [
  'images/apple.png',
  'images/orange.png',
  'images/banana.png',
  'images/pear.png',
  'images/strawberry.png',
  'images/watermelon.png'
];

let run=false, t;

function r(a,b){
  return Math.floor(Math.random()*(b-a+1))+a;
}

function validPosition(existing, x, y, minDist){
  for(let p of existing){
    let dx = p.x - x;
    let dy = p.y - y;
    if(Math.sqrt(dx*dx + dy*dy) < minDist) return false;
  }
  return true;
}

function gen(){
  const c = document.getElementById("c");
  c.innerHTML = "";

  let isSix = Math.random() < 0.5;
  let total = isSix ? 6 : [1,2,3,4,5,7][r(0,5)];

  let fruit1Index = r(0,5);
  let fruit2Index = r(0,5);
  while(fruit2Index === fruit1Index){
    fruit2Index = r(0,5);
  }

  let f1 = fruitsData[fruit1Index];
  let f2 = fruitsData[fruit2Index];

  let count1 = r(1, total-1);
  let count2 = total - count1;

  let placed = [];

  function place(src){
    let tries = 0;
    while(tries < 100){
      let x = r(80, 820);
      let y = r(80, 420);
      if(validPosition(placed, x, y, 130)){
        let img = document.createElement("img");
        img.src = src;
        img.style.left = x + "px";
        img.style.top = y + "px";
        c.appendChild(img);
        placed.push({x, y});
        return;
      }
      tries++;
    }
  }

  for(let i = 0; i < count1; i++) place(f1);
  for(let i = 0; i < count2; i++) place(f2);

  document.getElementById("groupInfo").textContent = isSix ? "Group of 6!" : `Group of ${total}`;
}

function loop(){
  if(!run) return;
  gen();
  t = setTimeout(loop, 4000);
}

function start(){
  run = true;
  loop();
}

function pause(){
  run = false;
  clearTimeout(t);
}
</script>

</body>
</html>
